
name: 기능 제안 (Feature Request)
description: 프로젝트에 추가하고 싶은 새로운 기능을 제안해 주세요.
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: input
    id: related-issues
    attributes:
      label: 🔗 관련 이슈
      description: 이 제안과 관련된 다른 이슈 번호나 PR이 있다면 링크해 주세요.
      placeholder: "예: #123"
    validations:
      required: false

  - type: textarea
    id: problem-description
    attributes:
      label: 🤔 필요한 이유 / 문제 상황
      description: 이 기능이 왜 필요한지, 현재 어떤 불편함이 있는지 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: feature-description
    attributes:
      label: ✨ 제안하는 기능 설명
      description: 추가되기를 원하는 기능이 구체적으로 어떻게 동작해야 하는지 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 💡 고려해본 대안
      description: 이 기능을 대신할 수 있는 다른 방법이나 대안을 생각해 보셨다면 적어주세요.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 📝 추가 정보
      description: 참고할 만한 스크린샷, 링크 등 추가적인 정보가 있다면 자유롭게 적어주세요.
    validations:
      required: false
